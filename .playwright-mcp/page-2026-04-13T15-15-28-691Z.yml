            - generic [ref=e212]:
              - generic [ref=e213] [cursor=pointer]:
                - generic [ref=e214]: "01"
                - paragraph [ref=e215]: When you stake your SOL with Jito, you'll receive in return the JitoSOL LST, which accrues staking and MEV rewards and can be used in DeFi.
              - generic [ref=e217] [cursor=pointer]:
                - generic [ref=e218]: "02"
                - paragraph [ref=e219]: Unlike traditional tokens, JitoSOL maintains a fixed quantity in your wallet while its exchange rate to SOL continuously increases.
              - generic [ref=e221] [cursor=pointer]:
                - generic [ref=e222]: "03"
                - paragraph [ref=e223]: As validators earn and redistribute staking and MEV rewards, the total SOL in the pool grows without minting additional JitoSOL tokens
              - generic [ref=e225] [cursor=pointer]:
                - generic [ref=e226]: "04"
                - paragraph [ref=e227]: Your JitoSOL automatically compounds value over time, as each token represents a growing portion of the expanding stake pool.
